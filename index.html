<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PDF Slide Viewer - ブラウザ上でPDFファイルを美しいスライド形式で表示。全画面スライドショー、キーボード操作、サムネイル一覧、ダークモード対応。">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    <title>PDF Slide Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <style>
        body {
            font-family: "BIZ UDPGothic", sans-serif;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
        }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
        .hide-cursor {
            cursor: none !important;
        }
        .laser-active {
            cursor: none !important;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen transition-colors duration-200 overflow-x-hidden flex flex-col">

    <header class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 px-4 py-3 flex flex-wrap items-center justify-between gap-3 sticky top-0 z-40 shadow-sm shrink-0">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 text-white p-2 rounded-lg shadow-md shadow-blue-500/20">
                <i class="fa-solid fa-file-pdf text-xl"></i>
            </div>
            <div>
                <h1 class="font-bold text-lg leading-tight tracking-tight">PDF Slide Viewer</h1>
                <p id="file-name-display" class="text-xs text-slate-500 dark:text-slate-400 max-w-[200px] sm:max-w-sm truncate hidden">ファイルが選択されていません</p>
            </div>
        </div>

        <div class="flex items-center gap-2 sm:gap-3 ml-auto">
            <button id="theme-toggle" class="p-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 transition-all duration-200 border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-800" title="ダークモード切替">
                <i class="fa-solid fa-moon dark:hidden text-lg"></i>
                <i class="fa-solid fa-sun hidden dark:block text-lg text-amber-400"></i>
            </button>
            <label class="cursor-pointer bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-xl font-medium transition-all duration-200 shadow-md shadow-blue-500/20 hover:shadow-blue-500/30 flex items-center gap-2 text-sm border border-blue-700">
                <i class="fa-solid fa-folder-open"></i>
                <span>PDFを開く</span>
                <input type="file" id="pdf-input" accept=".pdf" class="hidden">
            </label>
        </div>
    </header>

    <main id="main-content" class="flex-1 flex flex-col md:flex-row min-h-0 w-full relative">
        <div id="drop-zone" class="absolute inset-0 z-30 flex flex-col items-center justify-center p-6 bg-slate-50 dark:bg-slate-900 transition-all duration-300">
            <div class="max-w-md w-full border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-2xl p-8 sm:p-12 text-center bg-white dark:bg-slate-800 shadow-xl shadow-slate-200/50 dark:shadow-none flex flex-col items-center justify-center gap-4 transition-all duration-300 hover:border-blue-500 dark:hover:border-blue-400 group">
                <div class="w-16 h-16 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-2xl flex items-center justify-center mb-2 shadow-inner group-hover:scale-110 transition-transform duration-300">
                    <i class="fa-solid fa-cloud-arrow-up text-3xl"></i>
                </div>
                <h3 class="text-xl font-bold tracking-tight">PDFファイルをドロップ</h3>
                <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed">または、右上の「PDFを開く」ボタンからファイルを選択してください。</p>
                <div class="w-full border-t border-slate-100 dark:border-slate-700 my-2"></div>
                <div class="flex flex-wrap justify-center gap-x-4 gap-y-2 text-xs text-slate-400 dark:text-slate-500 font-medium">
                    <span><i class="fa-solid fa-shield-halved mr-1 text-emerald-500"></i>ローカル処理で安全</span>
                    <span><i class="fa-solid fa-keyboard mr-1 text-amber-500"></i>矢印キー操作対応</span>
                </div>
            </div>
        </div>

        <div id="viewer-container" class="hidden flex-1 flex flex-col md:flex-row min-h-0 w-full">
            
            <div class="flex-1 flex flex-col min-h-0 bg-slate-100 dark:bg-slate-950 p-3 sm:p-4 md:p-6 justify-between gap-4">
                <div class="flex-1 flex items-center justify-center relative min-h-0 w-full group">
                    <div id="canvas-container" class="relative max-w-full max-h-full shadow-2xl rounded-lg overflow-hidden bg-white dark:bg-slate-900 transition-all duration-300 border border-slate-200/50 dark:border-slate-800 flex items-center justify-center">
                        <canvas id="main-canvas" class="max-w-full max-h-full block object-contain"></canvas>
                    </div>

                    <button id="prev-btn-floating" class="absolute left-4 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-white/80 dark:bg-slate-800/80 shadow-lg border border-slate-200/50 dark:border-slate-700 flex items-center justify-center text-slate-700 dark:text-slate-300 opacity-0 group-hover:opacity-100 transition-all duration-200 hover:bg-white dark:hover:bg-slate-700 active:scale-95" title="前のページ">
                        <i class="fa-solid fa-chevron-left text-lg"></i>
                    </button>
                    <button id="next-btn-floating" class="absolute right-4 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-white/80 dark:bg-slate-800/80 shadow-lg border border-slate-200/50 dark:border-slate-700 flex items-center justify-center text-slate-700 dark:text-slate-300 opacity-0 group-hover:opacity-100 transition-all duration-200 hover:bg-white dark:hover:bg-slate-700 active:scale-95" title="次のページ">
                        <i class="fa-solid fa-chevron-right text-lg"></i>
                    </button>
                </div>

                <div class="bg-white dark:bg-slate-800 rounded-xl px-4 py-3 border border-slate-200 dark:border-slate-700 shadow-md flex flex-wrap items-center justify-between gap-3 shrink-0">
                    <div class="flex items-center gap-1 sm:gap-1.5">
                        <button id="prev-btn" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-400 disabled:opacity-30 disabled:pointer-events-none transition-colors" title="前のページ (← / PageUp)">
                            <i class="fa-solid fa-arrow-left text-base sm:text-lg"></i>
                        </button>
                        <span id="page-info" class="text-sm font-bold bg-slate-50 dark:bg-slate-900 px-3 py-1.5 rounded-lg border border-slate-200 dark:border-slate-700 min-w-[70px] text-center font-mono">
                            0 / 0
                        </span>
                        <button id="next-btn" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-400 disabled:opacity-30 disabled:pointer-events-none transition-colors" title="次のページ (→ / PageDown / Space)">
                            <i class="fa-solid fa-arrow-right text-base sm:text-lg"></i>
                        </button>
                    </div>

                    <div class="flex items-center gap-1.5 sm:gap-2">
                        <div class="flex items-center bg-slate-50 dark:bg-slate-900 rounded-lg border border-slate-200 dark:border-slate-700 p-0.5">
                            <button id="zoom-out-btn" class="p-1.5 rounded-md hover:bg-white dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 transition-colors" title="縮小">
                                <i class="fa-solid fa-minus text-xs sm:text-sm"></i>
                            </button>
                            <span id="zoom-info" class="text-xs font-bold font-mono px-2 min-w-[50px] text-center">100%</span>
                            <button id="zoom-in-btn" class="p-1.5 rounded-md hover:bg-white dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 transition-colors" title="拡大">
                                <i class="fa-solid fa-plus text-xs sm:text-sm"></i>
                            </button>
                            <div class="w-[1px] h-4 bg-slate-200 dark:bg-slate-700 mx-0.5"></div>
                            <button id="zoom-reset-btn" class="p-1.5 rounded-md hover:bg-white dark:hover:bg-slate-800 text-slate-500 dark:text-slate-400 transition-colors text-xs font-medium" title="ズームリセット">
                                自動
                            </button>
                        </div>

                        <button id="start-slideshow-btn" class="bg-slate-900 hover:bg-slate-800 dark:bg-slate-700 dark:hover:bg-slate-600 text-white px-3 sm:px-4 py-2 rounded-lg font-medium text-xs sm:text-sm transition-all shadow-sm flex items-center gap-1.5 border border-slate-800 dark:border-slate-600" title="全画面スライドショーを開始 (F5)">
                            <i class="fa-solid fa-play"></i>
                            <span class="hidden sm:inline">スライドショー</span>
                        </button>
                    </div>
                </div>
            </div>

            <div id="thumbnail-sidebar" class="w-full md:w-64 bg-white dark:bg-slate-800 border-t md:border-t-0 md:border-l border-slate-200 dark:border-slate-700 flex flex-col min-h-0 shrink-0">
                <div class="p-3 border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 flex items-center justify-between shrink-0">
                    <span class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 flex items-center gap-1.5">
                        <i class="fa-solid fa-images"></i>
                        スライド一覧
                    </span>
                    <span id="thumbnail-count" class="text-xs font-mono font-bold bg-slate-200 dark:bg-slate-700 px-2 py-0.5 rounded-full text-slate-600 dark:text-slate-300">0枚</span>
                </div>
                <div id="thumbnail-list" class="flex flex-row md:flex-col gap-3 p-3 overflow-x-auto md:overflow-x-hidden md:overflow-y-auto custom-scrollbar flex-1 min-h-0 items-center md:items-stretch">
                    </div>
            </div>

        </div>
    </main>

    <div id="presentation-container" class="fixed inset-0 bg-black z-50 hidden flex-col items-center justify-center select-none overflow-hidden">
        <div id="presentation-canvas-container" class="relative max-w-full max-h-full flex items-center justify-center">
            <canvas id="presentation-canvas" class="max-w-full max-h-full object-contain block"></canvas>
            <canvas id="laser-canvas" class="absolute inset-0 z-10 pointer-events-none hidden"></canvas>
        </div>

        <div id="presentation-controls" class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-slate-900/90 text-white rounded-xl px-4 py-2.5 shadow-2xl border border-slate-800 flex items-center gap-4 transition-opacity duration-300 z-20 backdrop-blur-sm">
            <div class="flex items-center gap-1">
                <button id="pres-prev-btn" class="p-1.5 rounded-lg hover:bg-slate-800 text-slate-300 hover:text-white transition-colors">
                    <i class="fa-solid fa-arrow-left text-base"></i>
                </button>
                <span id="pres-page-info" class="text-sm font-bold font-mono px-2 min-w-[60px] text-center text-slate-200">0 / 0</span>
                <button id="pres-next-btn" class="p-1.5 rounded-lg hover:bg-slate-800 text-slate-300 hover:text-white transition-colors">
                    <i class="fa-solid fa-arrow-right text-base"></i>
                </button>
            </div>
            <div class="w-[1px] h-5 bg-slate-700"></div>
            <div class="flex items-center gap-2">
                <button id="laser-toggle-btn" class="p-1.5 rounded-lg hover:bg-slate-800 text-slate-400 hover:text-white transition-colors flex items-center justify-center" title="レーザーポインター (L)">
                    <i class="fa-solid fa-circle text-rose-500 text-sm"></i>
                </button>
                <button id="fullscreen-toggle-btn" class="p-1.5 rounded-lg hover:bg-slate-800 text-slate-300 hover:text-white transition-colors" title="全画面切替 (F)">
                    <i class="fa-solid fa-expand"></i>
                </button>
                <button id="exit-presentation-btn" class="bg-rose-600 hover:bg-rose-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold transition-colors flex items-center gap-1" title="スライドショーを終了 (Esc)">
                    <i class="fa-solid fa-xmark"></i>
                    <span>終了</span>
                </button>
            </div>
        </div>
    </div>

    <div id="loading-overlay" class="fixed inset-0 bg-slate-950/60 backdrop-blur-sm z-50 flex flex-col items-center justify-center gap-4 hidden">
        <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-2xl flex flex-col items-center justify-center gap-4 max-w-xs w-full border border-slate-200 dark:border-slate-700">
            <div class="relative w-12 h-12">
                <div class="absolute inset-0 border-4 border-slate-200 dark:border-slate-700 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            </div>
            <p id="loading-text" class="text-sm font-bold text-center tracking-wide text-slate-700 dark:text-slate-300">PDFを読み込み中...</p>
        </div>
    </div>

    <script>
        const state = {
            pdf: null,
            currentPage: 1,
            totalPages: 0,
            zoom: 1.0,
            isPresentationMode: false,
            isFullscreen: false,
            laserPointerEnabled: false,
            laserPoint: { x: 0, y: 0 },
            controlsTimeout: null,
            renderQueue: Promise.resolve()
        };

        // DOM要素
        const pdfInput = document.getElementById('pdf-input');
        const dropZone = document.getElementById('drop-zone');
        const viewerContainer = document.getElementById('viewer-container');
        const fileNameDisplay = document.getElementById('file-name-display');
        const mainCanvas = document.getElementById('main-canvas');
        const canvasContainer = document.getElementById('canvas-container');
        const thumbnailList = document.getElementById('thumbnail-list');
        const thumbnailCount = document.getElementById('thumbnail-count');
        const pageInfo = document.getElementById('page-info');
        const zoomInfo = document.getElementById('zoom-info');
        
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const prevBtnFloating = document.getElementById('prev-btn-floating');
        const nextBtnFloating = document.getElementById('next-btn-floating');
        const zoomInBtn = document.getElementById('zoom-in-btn');
        const zoomOutBtn = document.getElementById('zoom-out-btn');
        const zoomResetBtn = document.getElementById('zoom-reset-btn');
        const startSlideshowBtn = document.getElementById('start-slideshow-btn');
        
        const presentationContainer = document.getElementById('presentation-container');
        const presentationCanvas = document.getElementById('presentation-canvas');
        const presentationCanvasContainer = document.getElementById('presentation-canvas-container');
        const laserCanvas = document.getElementById('laser-canvas');
        const presentationControls = document.getElementById('presentation-controls');
        const presPrevBtn = document.getElementById('pres-prev-btn');
        const presNextBtn = document.getElementById('pres-next-btn');
        const presPageInfo = document.getElementById('pres-page-info');
        const laserToggleBtn = document.getElementById('laser-toggle-btn');
        const fullscreenToggleBtn = document.getElementById('fullscreen-toggle-btn');
        const exitPresentationBtn = document.getElementById('exit-presentation-btn');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const themeToggle = document.getElementById('theme-toggle');

        // テーマ切替ロジック
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        themeToggle.addEventListener('click', () => {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
            if (state.pdf) {
                renderMainPage(state.currentPage);
                renderThumbnails();
            }
        });

        // ファイル受付設定
        pdfInput.addEventListener('change', handleFileSelect);
        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', (e) => {
            e.preventDefault();
            if (e.dataTransfer.files.length > 0 && e.dataTransfer.files[0].type === 'application/pdf') {
                loadPDF(e.dataTransfer.files[0]);
            }
        });

        function handleFileSelect(e) {
            if (e.target.files.length > 0) {
                loadPDF(e.target.files[0]);
            }
        }

        // PDFのロード処理
        async function loadPDF(file) {
            showLoading('PDFドキュメントを解析中...');
            fileNameDisplay.textContent = file.name;
            fileNameDisplay.classList.remove('hidden');
            dropZone.classList.add('hidden');
            viewerContainer.classList.remove('hidden');

            try {
                const arrayBuffer = await file.arrayBuffer();
                state.pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                state.totalPages = state.pdf.numPages;
                state.currentPage = 1;
                thumbnailCount.textContent = `${state.totalPages}枚`;
                
                resetZoom();
                await renderMainPage(state.currentPage);
                hideLoading();
                
                // サムネイルは非同期バックグラウンド生成
                renderThumbnails();
            } catch (error) {
                console.error(error);
                alert('PDFの読み込みに失敗しました。破損しているか、対応していない形式の可能性があります。');
                hideLoading();
                dropZone.classList.remove('hidden');
                viewerContainer.classList.add('hidden');
                fileNameDisplay.classList.add('hidden');
            }
        }

        // メインページレンダリング（キュー管理で描画崩れ防止）
        function renderMainPage(pageNo) {
            state.renderQueue = state.renderQueue.then(async () => {
                if (!state.pdf || state.isPresentationMode) return;
                showLoading(`ページ ${pageNo} を描画中...`);
                
                try {
                    const page = await state.pdf.getPage(pageNo);
                    const viewport = page.getViewport({ scale: 1.0 });
                    
                    // 最適な縮小・拡大率の算出（自動設定時）
                    let currentScale = state.zoom;
                    if (state.zoom === 'auto') {
                        const containerWidth = canvasContainer.clientWidth - 16;
                        const containerHeight = canvasContainer.clientHeight - 16;
                        const scaleX = containerWidth / viewport.width;
                        const scaleY = containerHeight / viewport.height;
                        currentScale = Math.min(scaleX, scaleY, 2.0); // 最大2倍まで
                        zoomInfo.textContent = `${Math.round(currentScale * 100)}%`;
                    }

                    const scaledViewport = page.getViewport({ scale: currentScale });
                    mainCanvas.width = scaledViewport.width;
                    mainCanvas.height = scaledViewport.height;

                    const renderContext = {
                        canvasContext: mainCanvas.getContext('2d'),
                        viewport: scaledViewport
                    };
                    await page.render(renderContext).promise;
                    
                    updateUI();
                } catch (err) {
                    console.error(err);
                } finally {
                    hideLoading();
                }
            });
            return state.renderQueue;
        }

        // 全画面用プレゼンテーションページの描画
        function renderPresentationPage(pageNo) {
            state.renderQueue = state.renderQueue.then(async () => {
                if (!state.pdf || !state.isPresentationMode) return;
                
                try {
                    const page = await state.pdf.getPage(pageNo);
                    const screenWidth = window.innerWidth;
                    const screenHeight = window.innerHeight;
                    const unscaledViewport = page.getViewport({ scale: 1.0 });
                    
                    const scaleX = screenWidth / unscaledViewport.width;
                    const scaleY = screenHeight / unscaledViewport.height;
                    const scale = Math.min(scaleX, scaleY);
                    
                    const viewport = page.getViewport({ scale });
                    presentationCanvas.width = viewport.width;
                    presentationCanvas.height = viewport.height;
                    
                    // レーザー用キャンバスをメインキャンバスのサイズに同期
                    laserCanvas.width = viewport.width;
                    laserCanvas.height = viewport.height;

                    const renderContext = {
                        canvasContext: presentationCanvas.getContext('2d'),
                        viewport: viewport
                    };
                    await page.render(renderContext).promise;
                    
                    presPageInfo.textContent = `${pageNo} / ${state.totalPages}`;
                    pageInfo.textContent = `${pageNo} / ${state.totalPages}`;
                    
                    updateThumbnailActiveState();
                    clearLaserPointer();
                } catch (err) {
                    console.error(err);
                }
            });
            return state.renderQueue;
        }

        // サムネイル群の生成
        async function renderThumbnails() {
            thumbnailList.innerHTML = '';
            if (!state.pdf) return;

            for (let i = 1; i <= state.totalPages; i++) {
                const thumbContainer = document.createElement('div');
                // モバイル横並び、PC縦並びを両立させるスタイリング
                thumbContainer.className = `relative shrink-0 cursor-pointer rounded-lg border-2 p-1 transition-all duration-200 bg-slate-50 dark:bg-slate-900 flex-col items-center gap-1 flex w-24 md:w-full ${
                    i === state.currentPage 
                    ? 'border-blue-600 bg-blue-50/50 dark:bg-blue-950/30' 
                    : 'border-slate-200 dark:border-slate-700 hover:border-slate-400 dark:hover:border-slate-500'
                }`;
                thumbContainer.dataset.page = i;

                const canvas = document.createElement('canvas');
                canvas.className = "w-full h-auto rounded block shadow-sm";
                thumbContainer.appendChild(canvas);

                const label = document.createElement('span');
                label.className = "text-[10px] font-mono font-bold text-slate-500 dark:text-slate-400 mt-0.5";
                label.textContent = i;
                thumbContainer.appendChild(label);

                thumbnailList.appendChild(thumbContainer);

                // 各サムネイルの中身描画
                state.pdf.getPage(i).then(async (page) => {
                    const viewport = page.getViewport({ scale: 1.0 });
                    const thumbScale = 120 / viewport.width; // 幅120px基準でスケーリング
                    const thumbViewport = page.getViewport({ scale: thumbScale });
                    
                    canvas.width = thumbViewport.width;
                    canvas.height = thumbViewport.height;
                    
                    const renderContext = {
                        canvasContext: canvas.getContext('2d'),
                        viewport: thumbViewport
                    };
                    await page.render(renderContext).promise;
                }).catch(err => console.error(err));

                thumbContainer.addEventListener('click', () => {
                    state.currentPage = i;
                    if (state.isPresentationMode) {
                        renderPresentationPage(state.currentPage);
                    } else {
                        renderMainPage(state.currentPage);
                    }
                });
            }
        }

        // 各UIパーツの状態更新
        function updateUI() {
            pageInfo.textContent = `${state.currentPage} / ${state.totalPages}`;
            prevBtn.disabled = state.currentPage <= 1;
            prevBtnFloating.style.display = state.currentPage <= 1 ? 'none' : 'flex';
            nextBtn.disabled = state.currentPage >= state.totalPages;
            nextBtnFloating.style.display = state.currentPage >= state.totalPages ? 'none' : 'flex';
            
            if (typeof state.zoom === 'number') {
                zoomInfo.textContent = `${Math.round(state.zoom * 100)}%`;
            }
            updateThumbnailActiveState();
        }

        // 現在のアクティブサムネイル枠の更新とスクロール追従
        function updateThumbnailActiveState() {
            const thumbs = thumbnailList.querySelectorAll('[data-page]');
            thumbs.forEach(thumb => {
                const p = parseInt(thumb.dataset.page);
                if (p === state.currentPage) {
                    thumb.className = "relative shrink-0 cursor-pointer rounded-lg border-2 p-1 transition-all duration-200 bg-blue-50/50 dark:bg-blue-950/30 border-blue-600 flex flex-col items-center gap-1 w-24 md:w-full";
                    // スムーススクロールで枠内に収める
                    thumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
                } else {
                    thumb.className = "relative shrink-0 cursor-pointer rounded-lg border-2 p-1 transition-all duration-200 bg-slate-50 dark:bg-slate-900 border-slate-200 dark:border-slate-700 hover:border-slate-400 dark:hover:border-slate-500 flex flex-col items-center gap-1 w-24 md:w-full";
                }
            });
        }

        function resetZoom() {
            state.zoom = 'auto';
            zoomInfo.textContent = '自動';
        }

        // ページ移動処理群
        function navigateToPrev() {
            if (state.currentPage > 1) {
                state.currentPage--;
                if (state.isPresentationMode) {
                    renderPresentationPage(state.currentPage);
                } else {
                    renderMainPage(state.currentPage);
                }
            }
        }

        function navigateToNext() {
            if (state.currentPage < state.totalPages) {
                state.currentPage++;
                if (state.isPresentationMode) {
                    renderPresentationPage(state.currentPage);
                } else {
                    renderMainPage(state.currentPage);
                }
            }
        }

        // 通常モード用イベントリスナー
        prevBtn.addEventListener('click', navigateToPrev);
        nextBtn.addEventListener('click', navigateToNext);
        prevBtnFloating.addEventListener('click', navigateToPrev);
        nextBtnFloating.addEventListener('click', navigateToNext);

        zoomInBtn.addEventListener('click', () => {
            if (state.zoom === 'auto') state.zoom = 1.0;
            if (state.zoom < 3.0) {
                state.zoom = Math.min(3.0, state.zoom + 0.1);
                renderMainPage(state.currentPage);
            }
        });

        zoomOutBtn.addEventListener('click', () => {
            if (state.zoom === 'auto') state.zoom = 1.0;
            if (state.zoom > 0.5) {
                state.zoom = Math.max(0.5, state.zoom - 0.1);
                renderMainPage(state.currentPage);
            }
        });

        zoomResetBtn.addEventListener('click', () => {
            resetZoom();
            renderMainPage(state.currentPage);
        });

        // ウィンドウリサイズ時のリサイズ追従
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                if (!state.pdf) return;
                if (state.isPresentationMode) {
                    renderPresentationPage(state.currentPage);
                } else {
                    renderMainPage(state.currentPage);
                }
            }, 150);
        });

        // プレゼンテーション（スライドショー）開始処理
        startSlideshowBtn.addEventListener('click', startSlideshow);

        function startSlideshow() {
            if (!state.pdf) return;
            state.isPresentationMode = true;
            presentationContainer.classList.remove('hidden');
            renderPresentationPage(state.currentPage);

            // フル画面リクエスト
            if (presentationContainer.requestFullscreen) {
                presentationContainer.requestFullscreen().then(() => {
                    state.isFullscreen = true;
                    updateExitFullscreenButton();
                }).catch(() => {
                    state.isFullscreen = false;
                    updateExitFullscreenButton();
                });
            } else {
                state.isFullscreen = false;
                updateExitFullscreenButton();
            }

            showPresentationControlsTemporarily();
        }

        // プレゼンテーションコントロールの自動格納制御
        function showPresentationControlsTemporarily() {
            presentationControls.style.opacity = '1';
            presentationControls.style.pointerEvents = 'auto';
            if (!state.laserPointerEnabled) {
                presentationContainer.classList.remove('hide-cursor');
            }
            
            clearTimeout(state.controlsTimeout);
            state.controlsTimeout = setTimeout(() => {
                if (state.isPresentationMode) {
                    presentationControls.style.opacity = '0';
                    presentationControls.style.pointerEvents = 'none';
                    if (state.laserPointerEnabled || presentationControls.style.opacity === '0') {
                        presentationContainer.classList.add('hide-cursor');
                    }
                }
            }, 3000);
        }

        presentationContainer.addEventListener('mousemove', (e) => {
            if (state.laserPointerEnabled) {
                const rect = presentationCanvas.getBoundingClientRect();
                state.laserPoint.x = e.clientX - rect.left;
                state.laserPoint.y = e.clientY - rect.top;
                drawLaserPointer();
            }
            showPresentationControlsTemporarily();
        });

        // レーザーポインター制御
        laserToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleLaserPointer();
        });

        function toggleLaserPointer() {
            state.laserPointerEnabled = !state.laserPointerEnabled;
            if (state.laserPointerEnabled) {
                laserCanvas.style.display = 'block';
                presentationContainer.classList.add('laser-active', 'hide-cursor');
                laserToggleBtn.classList.add('bg-slate-800', 'ring-2', 'ring-rose-500');
            } else {
                clearLaserPointer();
                laserCanvas.style.display = 'none';
                presentationContainer.classList.remove('laser-active', 'hide-cursor');
                laserToggleBtn.classList.remove('bg-slate-800', 'ring-2', 'ring-rose-500');
            }
        }

        function drawLaserPointer() {
            const ctx = laserCanvas.getContext('2d');
            ctx.clearRect(0, 0, laserCanvas.width, laserCanvas.height);
            
            if (!state.laserPointerEnabled) return;

            // 外光エフェクトの描画
            const gradient = ctx.createRadialGradient(
                state.laserPoint.x, state.laserPoint.y, 1,
                state.laserPoint.x, state.laserPoint.y, 12
            );
            gradient.addColorStop(0, 'rgba(244, 63, 94, 1)');
            gradient.addColorStop(0.2, 'rgba(244, 63, 94, 0.8)');
            gradient.addColorStop(1, 'rgba(244, 63, 94, 0)');

            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(state.laserPoint.x, state.laserPoint.y, 12, 0, Math.PI * 2);
            ctx.fill();

            // 中心コア部分の描画
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(state.laserPoint.x, state.laserPoint.y, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        function clearLaserPointer() {
            const ctx = laserCanvas.getContext('2d');
            ctx.clearRect(0, 0, laserCanvas.width, laserCanvas.height);
        }

        // フル画面切替ボタン用
        fullscreenToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!document.fullscreenElement) {
                presentationContainer.requestFullscreen().then(() => {
                    state.isFullscreen = true;
                    updateExitFullscreenButton();
                });
            } else {
                document.exitFullscreen();
                state.isFullscreen = false;
                updateExitFullscreenButton();
            }
        });

        function updateExitFullscreenButton() {
            if (document.fullscreenElement) {
                fullscreenToggleBtn.innerHTML = '<i class="fa-solid fa-compress"></i>';
            } else {
                fullscreenToggleBtn.innerHTML = '<i class="fa-solid fa-expand"></i>';
            }
        }

        // フル画面解除検知 (Escキーによる離脱を含む)
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement && state.isPresentationMode) {
                // フルスクリーンだけが解除され、プレゼンモード自体の終了ではない場合のケア
                state.isFullscreen = false;
                updateExitFullscreenButton();
            }
        });

        presPrevBtn.addEventListener('click', (e) => { e.stopPropagation(); navigateToPrev(); });
        presNextBtn.addEventListener('click', (e) => { e.stopPropagation(); navigateToNext(); });
        exitPresentationBtn.addEventListener('click', (e) => { e.stopPropagation(); exitSlideshow(); });
        presentationContainer.addEventListener('click', navigateToNext);

        function exitSlideshow() {
            state.isFullscreen = false;
            state.isPresentationMode = false;
            state.laserPointerEnabled = false;

            resetZoom();
            presentationContainer.classList.add('hidden');
            presentationContainer.classList.remove('hide-cursor', 'laser-active');
            laserCanvas.style.display = 'none';
            clearLaserPointer();
            laserToggleBtn.classList.remove('bg-slate-800', 'ring-2', 'ring-rose-500');

            if (document.fullscreenElement) {
                const exitPromise = document.exitFullscreen ? document.exitFullscreen() : Promise.resolve();
                exitPromise.then(() => {
                    setTimeout(() => {
                        renderMainPage(state.currentPage);
                    }, 50);
                }).catch(() => {
                    renderMainPage(state.currentPage);
                });
            } else {
                renderMainPage(state.currentPage);
            }
        }

        // キーボードショートカット
        window.addEventListener('keydown', (e) => {
            if (!state.pdf) return;
            
            switch(e.key) {
                case 'ArrowLeft':
                case 'PageUp':
                    e.preventDefault();
                    navigateToPrev();
                    break;
                case 'ArrowRight':
                case 'PageDown':
                case ' ':
                    e.preventDefault();
                    navigateToNext();
                    break;
                case 'Escape':
                    if (state.isPresentationMode) {
                        e.preventDefault();
                        exitSlideshow();
                    }
                    break;
                case 'f':
                case 'F':
                    if (state.isPresentationMode) {
                        e.preventDefault();
                        fullscreenToggleBtn.click();
                    }
                    break;
                case 'l':
                case 'L':
                    if (state.isPresentationMode) {
                        e.preventDefault();
                        toggleLaserPointer();
                    }
                    break;
                case 'F5':
                    if (!state.isPresentationMode) {
                        e.preventDefault();
                        startSlideshow();
                    }
                    break;
            }
        });

        function showLoading(text) {
            loadingText.textContent = text;
            loadingOverlay.classList.remove('hidden');
        }
        function hideLoading() {
            loadingOverlay.classList.add('hidden');
        }
    </script>
</body>
</html>
