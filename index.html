<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PDF Slide Viewer - ブラウザ上でPDFファイルを美しいスライド形式で表示。全画面スライドショー、キーボード操作、サムネイル一覧、ダークモード対応。">
    <meta name="robots" content="noindex, nofollow">
    <title>PDF Slide Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        #fs-page-indicator {
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(10px);
        }
        #fs-page-indicator.show {
            opacity: 1;
            transform: translateY(0);
        }
        #presentation-container {
            cursor: none;
        }
        #presentation-container.show-cursor {
            cursor: default;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-200 h-screen max-h-screen flex flex-col overflow-hidden">

    <div id="confirm-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center">
        <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-xl max-w-sm w-full mx-4 overflow-hidden">
            <div class="p-6">
                <div class="flex items-center gap-3 mb-4">
                    <i class="fa-solid fa-triangle-exclamation text-amber-500 text-2xl"></i>
                    <h3 class="text-lg font-semibold text-slate-900 dark:text-white">ファイルを閉じますか？</h3>
                </div>
                <p class="text-slate-600 dark:text-slate-400">
                    現在のPDFを閉じて、アップロード画面に戻ります。
                </p>
            </div>
            <div class="border-t border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-6 py-4 flex justify-end gap-3">
                <button id="confirm-cancel" class="px-5 py-2.5 text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition">
                    キャンセル
                </button>
                <button id="confirm-ok" class="px-5 py-2.5 text-sm font-medium bg-rose-600 hover:bg-rose-700 text-white rounded-xl transition">
                    閉じる
                </button>
            </div>
        </div>
    </div>

    <div id="upload-screen" class="flex-1 flex flex-col justify-center items-center p-6 max-w-4xl mx-auto w-full transition-opacity duration-300 overflow-y-auto">
        <div class="text-center mb-8">
            <div class="inline-flex p-3 bg-indigo-50 dark:bg-indigo-950 text-indigo-600 dark:text-indigo-400 rounded-2xl mb-4 shadow-sm">
                <i class="fa-solid fa-file-pdf text-4xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight sm:text-4xl mb-3">
                PDF Slide Viewer
            </h1>
            <p class="text-base text-slate-600 dark:text-slate-400 max-w-md mx-auto">
                PDFファイルをアップロードして、美しいスライド形式でプレゼンテーション。全画面スライドショー機能も搭載。
            </p>
        </div>

        <div id="drop-zone" class="w-full bg-white dark:bg-slate-900 border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-2xl p-8 text-center hover:border-indigo-500 hover:bg-slate-50 dark:hover:bg-slate-900/50 transition-all cursor-pointer shadow-sm group">
            <input type="file" id="pdf-input" accept=".pdf" class="hidden" />
            <div class="flex flex-col items-center">
                <i class="fa-solid fa-cloud-arrow-up text-5xl text-slate-400 dark:text-slate-600 group-hover:text-indigo-500 transition-colors mb-4"></i>
                <p class="text-base font-semibold text-slate-700 dark:text-slate-300 mb-1 group-hover:text-indigo-600 transition-colors">
                    PDFファイルをドラッグ＆ドロップ
                </p>
                <p class="text-sm text-slate-500 dark:text-slate-400 mb-5">
                    またはファイルを選択してください
                </p>
                <button type="button" onclick="document.getElementById('pdf-input').click()" class="px-5 py-2.5 bg-indigo-600 text-white font-medium text-sm rounded-lg shadow hover:bg-indigo-700 transition duration-150 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    ファイルを選択
                </button>
            </div>
        </div>

        <p class="text-xs text-slate-400 dark:text-slate-500 mt-6 flex items-center">
            <i class="fa-solid fa-shield-halved mr-1"></i>
            PDFファイルはすべてブラウザ上で処理され、サーバーにアップロードされることはありません。
        </p>
    </div>

    <div id="viewer-screen" class="hidden flex-1 flex flex-col h-full min-h-0 overflow-hidden">
        <header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-700 px-6 py-4 flex items-center justify-between z-10 shrink-0 shadow-sm">
            <div class="flex items-center space-x-4 max-w-[60%]">
                <button id="btn-back-to-upload" class="p-2 text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="ファイルを閉じる">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
                <div>
                    <h2 id="pdf-title" class="text-lg font-bold text-slate-900 dark:text-white truncate">PDF Title</h2>
                    <p id="pdf-subtitle" class="text-xs text-slate-500 dark:text-slate-400">読み込み完了</p>
                </div>
            </div>

            <div class="flex items-center space-x-3">
                <span class="text-sm font-medium text-slate-600 dark:text-slate-400 bg-slate-100 dark:bg-slate-800 px-3 py-1.5 rounded-lg">
                    <span id="current-page-num">1</span> / <span id="total-pages-num">--</span> ページ
                </span>

                <button id="btn-slideshow" class="flex items-center space-x-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium text-sm rounded-lg shadow-sm transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                    <i class="fa-solid fa-play text-sm"></i>
                    <span>スライドショー</span>
                </button>
            </div>
        </header>

        <div class="flex-1 flex min-h-0 bg-slate-100 dark:bg-slate-950 overflow-hidden">
            <aside class="w-64 bg-white dark:bg-slate-900 flex flex-col shrink-0 border-r border-slate-200 dark:border-slate-700 h-full">
                <div class="p-3 border-b border-slate-200 dark:border-slate-700 shrink-0">
                    <span class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">スライド一覧</span>
                </div>
                <div id="thumbnail-list" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar bg-white dark:bg-slate-900"></div>
            </aside>

            <main id="main-view-container" class="flex-1 overflow-auto p-8 flex items-center justify-center custom-scrollbar">
                <div class="max-w-full max-h-full flex items-center justify-center">
                    <div class="bg-white dark:bg-slate-900 rounded-xl shadow-lg border border-slate-200 dark:border-slate-700 overflow-hidden relative transition-transform duration-200">
                        <canvas id="main-canvas" class="max-w-full max-h-full block object-contain"></canvas>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="presentation-container" class="hidden fixed inset-0 bg-black z-50 flex items-center justify-center select-none">
        <canvas id="presentation-canvas" class="max-w-full max-h-full object-contain"></canvas>
        
        <div id="fs-page-indicator" class="absolute bottom-6 left-6 bg-black/70 text-white px-4 py-2 rounded-lg text-sm font-medium backdrop-blur-sm pointer-events-none">
            <span id="fs-current-page">1</span> / <span id="fs-total-pages">--</span> ページ
        </div>
    </div>

    <div id="loading-overlay" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex flex-col items-center justify-center text-white">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-500 border-t-transparent mb-4"></div>
        <p class="text-lg font-semibold" id="loading-text">PDFを処理中...</p>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        const state = {
            pdfDoc: null,
            currentPage: 1,
            totalPages: 0,
            pdfName: '',
            isFullscreen: false,
            renderedThumbnails: new Set()
        };

        const uploadScreen = document.getElementById('upload-screen');
        const viewerScreen = document.getElementById('viewer-screen');
        const presentationContainer = document.getElementById('presentation-container');
        const dropZone = document.getElementById('drop-zone');
        const pdfInput = document.getElementById('pdf-input');
        const pdfTitle = document.getElementById('pdf-title');
        const pdfSubtitle = document.getElementById('pdf-subtitle');
        const currentPageNum = document.getElementById('current-page-num');
        const totalPagesNum = document.getElementById('total-pages-num');
        const thumbnailList = document.getElementById('thumbnail-list');
        const mainCanvas = document.getElementById('main-canvas');
        const mainViewContainer = document.getElementById('main-view-container');
        const presentationCanvas = document.getElementById('presentation-canvas');
        
        const btnBackToUpload = document.getElementById('btn-back-to-upload');
        const btnSlideshow = document.getElementById('btn-slideshow');
        const fsPageIndicator = document.getElementById('fs-page-indicator');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');

        const confirmModal = document.getElementById('confirm-modal');
        const confirmOk = document.getElementById('confirm-ok');
        const confirmCancel = document.getElementById('confirm-cancel');

        let hideTimeout = null;
        let isInitialRender = false;

        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('border-indigo-500', 'bg-slate-50/80'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('border-indigo-500', 'bg-slate-50/80'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('border-indigo-500', 'bg-slate-50/80');
            if (e.dataTransfer.files[0]) handlePDFFile(e.dataTransfer.files[0]);
        });

        pdfInput.addEventListener('change', e => e.target.files[0] && handlePDFFile(e.target.files[0]));

        btnBackToUpload.addEventListener('click', () => confirmModal.classList.remove('hidden'));
        confirmCancel.addEventListener('click', () => confirmModal.classList.add('hidden'));
        confirmOk.addEventListener('click', () => { confirmModal.classList.add('hidden'); location.reload(); });

        btnSlideshow.addEventListener('click', startSlideshow);

        presentationContainer.addEventListener('mousemove', () => {
            showOverlay();
        });

        function showOverlay() {
            fsPageIndicator.classList.add('show');
            presentationContainer.classList.add('show-cursor');
            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => {
                fsPageIndicator.classList.remove('show');
                presentationContainer.classList.remove('show-cursor');
            }, 1500);
        }

        presentationContainer.addEventListener('click', () => changePage(state.currentPage + 1, false));

        document.addEventListener('keydown', e => {
            if (!state.pdfDoc) return;
            if (['ArrowRight','ArrowDown',' ','Enter'].includes(e.key)) {
                changePage(state.currentPage + 1, true);
            }
            else if (['ArrowLeft','ArrowUp','Backspace'].includes(e.key)) {
                changePage(state.currentPage - 1, true);
            }
            else if (e.key === 'Escape') {
                if (state.isFullscreen) exitSlideshow();
                else if (!confirmModal.classList.contains('hidden')) confirmModal.classList.add('hidden');
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement && isInitialRender) {
                isInitialRender = false;
                renderPresentationPage(state.currentPage);
            } else if (!document.fullscreenElement && state.isFullscreen) {
                exitSlideshow();
            }
        });

        function handlePDFFile(file) {
            showLoading('PDFを解析中...');
            state.pdfName = file.name;
            const reader = new FileReader();
            reader.onload = () => {
                pdfjsLib.getDocument(new Uint8Array(reader.result)).promise.then(pdf => {
                    state.pdfDoc = pdf;
                    state.totalPages = pdf.numPages;
                    state.currentPage = 1;

                    pdfTitle.textContent = state.pdfName;
                    pdfSubtitle.textContent = `総ページ数: ${state.totalPages} ページ`;
                    totalPagesNum.textContent = state.totalPages;
                    document.getElementById('fs-total-pages').textContent = state.totalPages;

                    uploadScreen.classList.add('hidden');
                    viewerScreen.classList.remove('hidden');
                    initViewer();
                }).catch(() => {
                    hideLoading();
                    alert('PDF読み込みに失敗しました');
                });
            };
            reader.readAsArrayBuffer(file);
        }

        async function initViewer() {
            showLoading('スライド一覧を生成中...');
            thumbnailList.innerHTML = '';
            for (let i = 1; i <= state.totalPages; i++) createThumbnailPlaceholder(i);
            await renderMainPage(1);
            renderThumbnailsSequentially();
            hideLoading();
        }

        function createThumbnailPlaceholder(pageNum) {
            const wrapper = document.createElement('div');
            wrapper.id = `thumb-wrapper-${pageNum}`;
            wrapper.className = `cursor-pointer flex flex-col items-center p-2 rounded-lg transition-all border border-transparent hover:bg-slate-100 dark:hover:bg-slate-800 group ${pageNum === 1 ? 'bg-slate-100 dark:bg-slate-800 border-indigo-500/50 ring-1 ring-indigo-500' : ''}`;
            wrapper.onclick = () => changePage(pageNum, false);

            const canvas = document.createElement('canvas');
            canvas.id = `thumb-canvas-${pageNum}`;
            canvas.className = "w-full rounded bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-md group-hover:scale-[1.02] transition-transform duration-200 block";
            
            const label = document.createElement('span');
            label.className = "text-xs mt-1.5 text-slate-500 dark:text-slate-400 font-medium group-hover:text-slate-900 dark:group-hover:text-white transition-colors";
            label.textContent = pageNum;

            wrapper.append(canvas, label);
            thumbnailList.appendChild(wrapper);
        }

        async function renderThumbnailsSequentially() {
            for (let i = 1; i <= state.totalPages; i++) {
                if (!state.renderedThumbnails.has(i)) await renderThumbnail(i);
            }
        }

        async function renderThumbnail(pageNum) {
            try {
                const page = await state.pdfDoc.getPage(pageNum);
                const canvas = document.getElementById(`thumb-canvas-${pageNum}`);
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const viewport = page.getViewport({ scale: 0.25 });
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                await page.render({canvasContext: ctx, viewport}).promise;
                state.renderedThumbnails.add(pageNum);
            } catch (_) {}
        }

        let currentRenderTask = null;
        async function renderMainPage(pageNum) {
            if (!state.pdfDoc) return;
            if (currentRenderTask) currentRenderTask.cancel();
            try {
                const page = await state.pdfDoc.getPage(pageNum);
                const ctx = mainCanvas.getContext('2d');
                const containerW = mainViewContainer.clientWidth - 64;
                const containerH = mainViewContainer.clientHeight - 64;
                const unscaled = page.getViewport({scale: 1});
                const dpr = window.devicePixelRatio || 1;
                const scale = Math.min(containerW / unscaled.width, containerH / unscaled.height) * dpr;
                const viewport = page.getViewport({scale});

                mainCanvas.width = viewport.width;
                mainCanvas.height = viewport.height;
                mainCanvas.style.width = `${viewport.width / dpr}px`;
                mainCanvas.style.height = `${viewport.height / dpr}px`;

                currentRenderTask = page.render({canvasContext: ctx, viewport});
                await currentRenderTask.promise;

                currentPageNum.textContent = pageNum;
                updateThumbnailActiveState(pageNum);
            } catch (_) {}
        }

        function updateThumbnailActiveState(activePageNum) {
            for (let i = 1; i <= state.totalPages; i++) {
                const wrapper = document.getElementById(`thumb-wrapper-${i}`);
                if (!wrapper) continue;
                if (i === activePageNum) {
                    wrapper.classList.add('bg-slate-100', 'dark:bg-slate-800', 'border-indigo-500/50', 'ring-1', 'ring-indigo-500');
                    wrapper.classList.remove('border-transparent');
                    wrapper.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                } else {
                    wrapper.classList.remove('bg-slate-100', 'dark:bg-slate-800', 'border-indigo-500/50', 'ring-1', 'ring-indigo-500');
                    wrapper.classList.add('border-transparent');
                }
            }
        }

        function changePage(target, fromKeyboard = false) {
            if (!state.pdfDoc || target < 1 || target > state.totalPages) return;
            state.currentPage = target;
            if (state.isFullscreen) {
                renderPresentationPage(target);
                if (!fromKeyboard) {
                    showOverlay();
                }
            } else {
                renderMainPage(target);
            }
        }

        let presentationRenderTask = null;
        async function renderPresentationPage(pageNum) {
            if (!state.pdfDoc) return;
            if (presentationRenderTask) presentationRenderTask.cancel();
            try {
                const page = await state.pdfDoc.getPage(pageNum);
                const ctx = presentationCanvas.getContext('2d');
                const dpr = window.devicePixelRatio || 1;
                const vw = window.innerWidth, vh = window.innerHeight;
                const unscaled = page.getViewport({scale: 1});
                const scale = Math.min(vw / unscaled.width, vh / unscaled.height) * dpr;
                const viewport = page.getViewport({scale});

                presentationCanvas.width = viewport.width;
                presentationCanvas.height = viewport.height;
                presentationCanvas.style.width = `${viewport.width / dpr}px`;
                presentationCanvas.style.height = `${viewport.height / dpr}px`;

                presentationRenderTask = page.render({canvasContext: ctx, viewport});
                await presentationRenderTask.promise;
                document.getElementById('fs-current-page').textContent = pageNum;
            } catch (_) {}
        }

        function startSlideshow() {
            if (!state.pdfDoc) return;
            state.isFullscreen = true;
            presentationContainer.classList.remove('hidden');
            isInitialRender = true;

            const elem = presentationContainer;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
            else {
                renderPresentationPage(state.currentPage);
                isInitialRender = false;
            }
        }

        function exitSlideshow() {
            state.isFullscreen = false;
            if (document.fullscreenElement) document.exitFullscreen();
            presentationContainer.classList.add('hidden');
            renderMainPage(state.currentPage);
        }

        function showLoading(text) {
            loadingText.textContent = text;
            loadingOverlay.classList.remove('hidden');
        }
        function hideLoading() {
            loadingOverlay.classList.add('hidden');
        }
    </script>
</body>
</html>
